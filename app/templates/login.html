<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Авторизація</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 10% !important;">
        <h2>Вхід у систему</h2>
        <form action="/auth/login" method="POST">
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px;">Email:</label>
                <input type="email" name="email" required style="width:100%; padding:8px; background:#2d2d2d; border:1px solid #444; color:#fff; border-radius:4px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:5px;">Пароль:</label>
                <input type="password" name="password" required style="width:100%; padding:8px; background:#2d2d2d; border:1px solid #444; color:#fff; border-radius:4px;">
            </div>
            <button type="submit" class="btn" style="width: 100%;">Увійти</button>
        </form>
        <p style="margin-top:15px; text-align:center;">
            Немає акаунту? <a href="/auth/register">Зареєструватися</a>
        </p>
    </div>
</body>
</html>
