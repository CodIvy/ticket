<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Каталог концертів</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Доступні концерти</h1>
            <a href="/auth/logout" style="color: #cf6679;">Вихід</a>
        </div>
        <hr>
        {% for concert in concerts %}
        <div style="background: #2d2d2d; padding: 20px; margin-bottom: 15px; border-radius: 6px;">
            <h2>{{ concert.title }}</h2>
            <p><strong>Виконавець:</strong> {{ concert.artist }}</p>
            <p><strong>Жанр:</strong> {{ concert.genre }} | <strong>Локація:</strong> {{ concert.location }}</p>
            <p><strong>Ціна квитка:</strong> {{ concert.base_price }} грн</p>
            <a href="/concert/{{ concert.id }}/seats" class="btn" style="display: inline-block;">Вибрати місце</a>
        </div>
        {% else %}
        <p>Наразі немає активних концертів.</p>
        {% endfor %}
    </div>
</body>
</html>
